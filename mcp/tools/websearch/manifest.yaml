name: websearch
package: mcp.tools.websearch
version: 1.0.0
status: stable
owner: platform
required: true

description: Search the public web through DuckDuckGo/DDGS and return bounded structured results.

capabilities:
  - name: web.search
    type: tool
    risk_level: read_only
    description: Search public web results.

tools:
  - name: websearch.search
    function: search
    capability: web.search
    description: Search public web results using DuckDuckGo/DDGS.
    risk_level: read_only
    input_schema: auto
    output_schema: structured_results
    timeout_seconds: 20
    max_result_bytes: 65536
    tags: [web, search, read_only]

config_schema:
  type: object
  required: [provider, max_results]
  properties:
    provider:
      type: string
      enum: [ddgs]
    backend:
      type: string
      minLength: 1
      maxLength: 50
    max_results:
      type: integer
      minimum: 1
      maximum: 25
    region:
      type: string
      minLength: 2
      maxLength: 32
    safesearch:
      type: string
      enum: [off, moderate, strict]
    time_limit:
      type: string
      enum: [d, w, m, y]
    max_query_chars:
      type: integer
      minimum: 1
      maximum: 500
    timeout_seconds:
      type: integer
      minimum: 1
      maximum: 60
    cache_seconds:
      type: integer
      minimum: 0
      maximum: 3600
    allowed_result_fields:
      type: array
      minItems: 1
      maxItems: 10
    result_limits:
      type: object
