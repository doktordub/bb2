features:
  streaming_enabled: true

agents:
  plugins:
    support_agent:
      enabled: true
      type: general_assistant
      display_name: Support Agent
      description: General purpose assistant for direct answers.
      llm_profile: fake_streaming
      prompt_profile: general_assistant_v1
      module: null
      class_name: null
      capabilities:
        answer: true
        stream: true
        memory_read: false
        memory_write: false
        tool_intents: false
        tool_execute: false

orchestration:
  defaults:
    conversation_context:
      enabled: true
      mode: window
      max_messages: 8
      max_chars: 4000
      include_assistant_messages: true
      summary_threshold_messages: 12
      summary_max_chars: 1200
  strategies:
    direct_agent:
      llm_profile: fake_streaming
  usecases:
    default_chat:
      strategy: direct_agent
      agent: support_agent
      llm_profile: fake_streaming
      allowed_agents:
        - support_agent
      policy_profile: default

llm:
  defaults:
    profile: fake_streaming
    timeout_seconds: 45
    stream_timeout_seconds: 60
    max_retries: 0
    trace_prompts: false
    trace_completions: false
  providers:
    fake_provider:
      type: fake
      enabled: true
      timeout_seconds: 45
      stream_timeout_seconds: 60
      extra:
        response_text: continuity-missing
  profiles:
    fake_streaming:
      enabled: true
      provider: fake_provider
      model: fake-streaming-model
      supports_streaming: true
      supports_json_schema: false
      supports_tool_calling: false
      max_output_tokens: 256
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles: []