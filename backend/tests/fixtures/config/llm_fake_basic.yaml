orchestration:
  strategies:
    direct_agent:
      llm_profile: fake_basic
  usecases:
    default_chat:
      llm_profile: fake_basic

llm:
  defaults:
    profile: fake_basic
    timeout_seconds: 45
    stream_timeout_seconds: 60
    max_retries: 0
    trace_prompts: false
    trace_completions: false
  providers:
    fake_provider:
      type: fake
      enabled: true
      timeout_seconds: 45
      stream_timeout_seconds: 60
  profiles:
    fake_basic:
      provider: fake_provider
      model: fake-basic-model
      temperature: 0.1
      max_output_tokens: 512
      supports_streaming: false
      supports_json_schema: false
      supports_tool_calling: false
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles: []