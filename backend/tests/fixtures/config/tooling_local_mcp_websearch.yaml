app:
  name: pluggable-agentic-ai-backend
  environment: local
  active_usecase: default_chat
  data_dir: ${env:APP_DATA_DIR:./data}

orchestration:
  enabled: true
  defaults:
    strategy: direct_agent
    fallback_strategy: direct_agent
    max_steps: 8
    max_tool_calls: 4
    max_memory_searches: 3
    max_llm_calls: 6
    max_turn_duration_seconds: 120
    max_stream_duration_seconds: 300
    emit_step_events: true
    emit_tool_events: true
    emit_memory_events: true
    expose_chain_of_thought: false
    save_runtime_snapshots: false
  strategies:
    direct_agent:
      enabled: true
      type: direct_agent
      default_agent: support_agent
      allowed_usecases:
        - default_chat
      llm_profile: local_reasoning
      memory_enabled: false
      tools_enabled: true
  usecases:
    default_chat:
      enabled: true
      description: Local MCP websearch smoke test use case.
      strategy: direct_agent
      agent: support_agent
      llm_profile: local_reasoning
      allowed_agents:
        - support_agent
      policy_profile: default
      tools:
        enabled: true
        allowed_tools:
          - websearch.search

features:
  streaming_enabled: false
  memory_enabled: false
  tools_enabled: true
  trace_enabled: true

tooling:
  enabled: true
  defaults:
    timeout_seconds: 60
    stream_timeout_seconds: 300
    max_retries: 0
    max_argument_bytes: 4096
    max_result_bytes: 65536
    trace_arguments: false
    trace_results: false
    discovery_on_startup: true
    discovery_refresh_seconds: 300
  registry:
    allow_discovered_tools: true
    require_configured_allowlist: true
    tools:
      websearch.search:
        enabled: true
        mcp_tool_name: websearch.search
        description: Search the public web through the configured MCP server.
        allowed_for:
          usecases:
            - default_chat
          agents:
            - support_agent
          strategies:
            - direct_agent
        timeout_seconds: 20
        max_argument_bytes: 4096
        max_result_bytes: 65536
        approval_required: false
        input_schema_override:
          type: object
          properties:
            query:
              type: string
              minLength: 1
            max_results:
              type: integer
              minimum: 1
              maximum: 10
          required:
            - query
          additionalProperties: false
        tags:
          - web
          - search
        safety_level: read_only

agents:
  support_agent:
    enabled: true
    module: app.testing.fakes.fake_agent
    class_name: FakeAgent
    description: Minimal fake agent.
    allowed_tools:
      - websearch.search

llm:
  defaults:
    profile: local_reasoning
    timeout_seconds: 120
    stream_timeout_seconds: 300
    max_retries: 1
    trace_prompts: false
    trace_completions: false
  providers:
    local_provider:
      type: openai_compatible
      enabled: true
      base_url: ${env:LOCAL_LLM_BASE_URL:http://localhost:8081/v1}
      api_key: ${env:LOCAL_LLM_API_KEY:}
      timeout_seconds: 120
      stream_timeout_seconds: 300
      headers:
        Content-Type: application/json
  profiles:
    local_reasoning:
      enabled: true
      provider: local_provider
      model: local-reasoning-model
      temperature: 0.7
      max_output_tokens: 2048
      supports_streaming: true
      supports_json_schema: false
      supports_tool_calling: false
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles: []

mcp:
  main:
    name: local_websearch
    enabled: true
    endpoint: ${env:MCP_MAIN_URL:http://127.0.0.1:9001/mcp}
    transport: http
    timeout_seconds: 20
    stream_timeout_seconds: 60
    auth:
      mode: none
      token: ${env:MCP_BEARER_TOKEN:}
      jwt: ${env:MCP_JWT:}
      oauth:
        token_url: ${env:MCP_OAUTH_TOKEN_URL:}
        client_id: ${env:MCP_OAUTH_CLIENT_ID:}
        client_secret: ${env:MCP_OAUTH_CLIENT_SECRET:}
        scopes: []
    tool_discovery_enabled: true

persistence:
  workflow_state:
    provider: sqlite
    path: ${env:APP_DATA_DIR:./data}/workflow_state.db
  trace:
    provider: sqlite
    path: ${env:APP_DATA_DIR:./data}/trace.db
  memory:
    provider: memory_store
    config:
      database_path: ${env:MEMORY_STORE_DB_PATH:./data/memory}

policy:
  enabled: true
  mode: enforce
  default_decision: deny
  fail_closed: true
  default_profile: default
  profiles:
    default:
      deny_unknown_tools: true
      deny_unknown_llm_profiles: true
      require_memory_scope: true
      allow_memory_writes: false
      allow_write_tools: false
      allow_destructive_tools: false
      allow_external_side_effect_tools: false
      allow_approval_required_tools: false

observability:
  log_level: ${env:APP_LOG_LEVEL:INFO}
  structured_logging: true
  trace_enabled: true
  trace_payloads_enabled: false
  trace_store_required: true
  redact_secrets: true
  include_stack_traces_in_logs: false
  include_stack_traces_in_traces: false
  max_trace_payload_chars: 4000
  slow_request_ms: 2500
  slow_llm_call_ms: 15000
  slow_tool_call_ms: 5000
  metrics_enabled: true

health:
  expose_config_summary: true
  expose_provider_names: true
  expose_secret_values: false
  include_component_details: true