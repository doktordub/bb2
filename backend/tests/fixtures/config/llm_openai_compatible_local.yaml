llm:
  defaults:
    profile: local_reasoning
    timeout_seconds: 45
    stream_timeout_seconds: 90
    max_retries: 0
    trace_prompts: false
    trace_completions: false
  providers:
    local_provider:
      type: openai_compatible
      enabled: true
      base_url: ${env:LOCAL_LLM_BASE_URL:http://127.0.0.1:8081/v1}
      api_key: ${env:LOCAL_LLM_API_KEY:}
      timeout_seconds: 45
      stream_timeout_seconds: 90
      headers: {}
  profiles:
    local_reasoning:
      enabled: true
      provider: local_provider
      model: local-reasoning-model
      temperature: 0.2
      max_output_tokens: 256
      supports_streaming: true
      supports_json_schema: false
      supports_tool_calling: true
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles: []