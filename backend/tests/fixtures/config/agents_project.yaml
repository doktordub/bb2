features:
  memory_enabled: true
  tools_enabled: true

memory:
  enabled: true

usecases:
  default_chat:
    tools:
      enabled: true
      allowed_tools:
        - documents_search
        - project_read_file

tooling:
  enabled: true
  registry:
    tools:
      documents_search:
        enabled: true
        mcp_tool_name: documents.search
        allowed_for:
          usecases:
            - default_chat
          agents:
            - support_agent
          strategies:
            - direct_agent
        safety_level: read_only
      project_read_file:
        enabled: true
        mcp_tool_name: project.read_file
        allowed_for:
          usecases:
            - default_chat
          agents:
            - support_agent
          strategies:
            - direct_agent
        safety_level: read_only

agents:
  defaults:
    strict_prompt_profile_validation: true
    known_prompt_profiles:
      - project_agent_v1
  plugins:
    support_agent:
      type: project_agent
      display_name: Project Agent
      description: Uses project-scoped context and logical project tools.
      llm_profile: local_reasoning
      prompt_profile: project_agent_v1
      capabilities:
        answer: true
        stream: true
        tool_intents: true
        tool_execute: false
        memory_read: true
        memory_write: false
      allowed_tool_intents:
        - documents_search
        - project_read_file
      allowed_memory_scopes:
        - project
        - user
