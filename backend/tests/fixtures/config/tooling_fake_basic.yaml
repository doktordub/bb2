features:
  tools_enabled: true

usecases:
  default_chat:
    tools:
      enabled: true
      allowed_tools:
        - documents.search

agents:
  support_agent:
    allowed_tools:
      - documents.search

tooling:
  enabled: true
  defaults:
    timeout_seconds: 45
    stream_timeout_seconds: 90
    max_retries: 2
    max_argument_bytes: 4096
    max_result_bytes: 131072
    trace_arguments: false
    trace_results: false
    discovery_on_startup: true
    discovery_refresh_seconds: 120
  registry:
    allow_discovered_tools: true
    require_configured_allowlist: true
    tools:
      documents.search:
        enabled: true
        mcp_tool_name: documents.search
        description: Search indexed documents through the MCP server.
        allowed_for:
          usecases:
            - default_chat
          agents:
            - support_agent
          strategies:
            - direct_agent
        timeout_seconds: 30
        max_argument_bytes: 4096
        max_result_bytes: 65536
        approval_required: false
        input_schema_override:
          type: object
          required:
            - query
          properties:
            query:
              type: string
            limit:
              type: integer
        tags:
          - documents
          - search
        safety_level: read_only

mcp:
  main:
    name: fake_main
    enabled: true
    endpoint: ${env:MCP_MAIN_URL:http://localhost:9001/mcp}
    transport: http
    timeout_seconds: 45
    stream_timeout_seconds: 90
    auth:
      mode: none
    tool_discovery_enabled: true