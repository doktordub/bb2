memory:
  enabled: true
  provider: memory_store
  required: false
  defaults:
    top_k: 6
    trace_query_capture: none
    trace_result_content_capture: none
  store:
    database:
      path: ${env:MEMORY_STORE_DB_PATH:./data/memory-store-real-local}
      schema_version: 1
  search:
    limit_max: 12
    final_top_k: 6
    graph_expansion_enabled: false
    graph_expansion_hops: 0
  lifecycle:
    allow_writes: true
