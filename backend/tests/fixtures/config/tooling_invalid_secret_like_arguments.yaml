features:
  tools_enabled: true

usecases:
  default_chat:
    tools:
      enabled: true
      allowed_tools:
        - project.inspect

agents:
  support_agent:
    allowed_tools:
      - project.inspect

tooling:
  enabled: true
  registry:
    tools:
      project.inspect:
        enabled: true
        mcp_tool_name: project.inspect
        description: Inspect project metadata through the MCP server.
        allowed_for:
          usecases:
            - default_chat
          agents:
            - support_agent
          strategies:
            - direct_agent
        approval_required: false
        input_schema_override:
          type: object
          required:
            - query
          properties:
            query:
              type: string
        tags:
          - inspection
        safety_level: read_only

mcp:
  main:
    endpoint: http://tooling.invalid/mcp