orchestration:
  strategies:
    direct_agent:
      llm_profile: fake_primary
  usecases:
    default_chat:
      llm_profile: fake_primary

llm:
  defaults:
    profile: fake_primary
    timeout_seconds: 45
    stream_timeout_seconds: 60
    max_retries: 2
    trace_prompts: false
    trace_completions: false
  providers:
    fake_provider:
      type: fake
      enabled: true
      timeout_seconds: 45
      stream_timeout_seconds: 60
  profiles:
    fake_primary:
      provider: fake_provider
      model: fake-primary-model
      temperature: 0.1
      max_output_tokens: 512
      supports_streaming: true
      supports_json_schema: false
      supports_tool_calling: false
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles:
        - fake_backup
    fake_backup:
      provider: fake_provider
      model: fake-backup-model
      temperature: 0.3
      max_output_tokens: 256
      supports_streaming: false
      supports_json_schema: false
      supports_tool_calling: false
      allowed_for:
        usecases:
          - default_chat
        agents:
          - support_agent
        strategies:
          - direct_agent
      fallback_profiles: []