app:
  name: pluggable-agentic-ai-backend
  environment: local
  active_usecase: default_chat
  data_dir: ${env:APP_DATA_DIR:./data}

deployment:
  profile: ${env:APP_ENV:local}
  host: ${env:APP_HOST:127.0.0.1}
  port: ${env:APP_PORT:8000}
  public_base_url: ${env:APP_PUBLIC_BASE_URL:http://localhost:8000}
  log_dir: ${env:APP_LOG_DIR:./logs}
  runtime_dir: ${env:APP_RUNTIME_DIR:./runtime}
  graceful_shutdown_seconds: ${env:APP_GRACEFUL_SHUTDOWN_SECONDS:20}
  metrics:
    enabled: ${env:METRICS_ENABLED:true}
    bind_host: ${env:METRICS_BIND_HOST:127.0.0.1}
    port: ${env:METRICS_PORT:9102}
  readiness:
    enabled: true

# Orchestration runtime owns one user turn. It chooses how work should happen, not what every domain-specific response should say.
orchestration:
  enabled: true
  defaults:
    strategy: direct_agent
    fallback_strategy: fallback_answer
    max_steps: 10
    max_tool_calls: 8
    max_memory_searches: 3
    max_memory_writes: 1
    max_llm_calls: 10
    max_tool_loop_iterations: 6
    max_context_bytes: 64000
    max_turn_duration_seconds: 120
    max_stream_duration_seconds: 120
    emit_step_events: true
    emit_tool_events: true
    emit_memory_events: true
    stream_strategy_events: true
    expose_strategy_metadata: true
    expose_chain_of_thought: false
    save_runtime_snapshots: false
    conversation_context:
      enabled: true
      mode: window
      max_messages: 12
      max_chars: 12000
      include_assistant_messages: true
      summary_threshold_messages: 24
      summary_max_chars: 4000
  strategies: # Strategies define the shape of a turn. They decide whether to answer directly, retrieve memory first, call tools, route among agents, update memory, or produce a fallback.
    direct_agent:
      enabled: true
      type: direct_agent
      description: Run the configured default agent directly.
      default_agent: support_agent
      allowed_usecases:
        - default_chat
        - support_web_chat
      llm_profile: local_reasoning
      memory_enabled: false
      memory_write_enabled: false
      tools_enabled: true
      stream_llm_deltas: true
      expose_strategy_metadata: true
    retrieval_augmented:
      enabled: true
      type: retrieval_augmented
      description: Search memory for relevant document context before answering.
      default_agent: architecture_document_agent
      allowed_usecases:
        - architecture_document_qa
      llm_profile: local_reasoning
      memory_enabled: true
      memory_write_enabled: false
      tools_enabled: false
      stream_llm_deltas: true
      expose_strategy_metadata: true
      memory:
        default_limit: 8
        include_document_chunks: true
        include_user_memory: true
    tool_assisted:
      enabled: true
      type: tool_assisted
      description: Run one bounded logical tool call, then synthesize a final answer.
      default_agent: tool_using_agent
      allowed_usecases:
        - default_chat
        - support_web_chat
      llm_profile: local_reasoning
      memory_enabled: false
      tools_enabled: true
      stream_llm_deltas: true
      expose_strategy_metadata: true
      tools:
        allowed_tools:
          - websearch.search
          - reporting.query_metric_series
    bounded_planner:
      enabled: true
      type: bounded_planner
      default_agent: support_agent
      planner_llm_profile: local_reasoning
      executor_llm_profile: local_reasoning
      memory_enabled: true
      memory_write_enabled: true
      tools_enabled: true
      max_plan_steps: 4
      max_execute_steps: 4
      max_memory_writes: 1
      max_tool_loop_iterations: 2
      max_context_bytes: 32000
      stream_strategy_events: true
      expose_strategy_metadata: true
    memory_update:
      enabled: true
      type: memory_update
      default_agent: support_agent
      llm_profile: local_reasoning
      memory_enabled: true
      memory_write_enabled: true
      max_memory_writes: 1
      candidate_limit: 3
      require_policy_approval: true
      expose_strategy_metadata: true
    fallback_answer:
      enabled: true
      type: fallback_answer
      llm_profile: local_reasoning
      message: I could not complete the full workflow, but here is the safest answer I can provide.
      allowed_usecases:
        - default_chat
        - support_web_chat
        - architecture_document_qa
        - task_execution_chat
      expose_strategy_metadata: true
  usecases:
    default_chat:
      enabled: true
      description: Default local backend use case.
      strategy: tool_assisted
      agent: tool_using_agent
      llm_profile: local_reasoning
      allowed_agents:
        - tool_using_agent
        - support_agent
        - chart_agent
      allowed_strategies:
        - direct_agent
        - tool_assisted
        - fallback_answer
      policy_profile: default
      tools:
        enabled: true
        allowed_tools: [websearch.search, reporting.query_metric_series]
    support_web_chat:
      enabled: true
      display_name: Support + Web Search
      description: Answer support questions directly and use web search when current public information is needed.
      strategy: tool_assisted
      agent: support_web_agent
      llm_profile: local_reasoning
      allowed_agents:
        - support_agent
        - support_web_agent
        - chart_agent
      allowed_strategies:
        - direct_agent
        - tool_assisted
        - fallback_answer
      policy_profile: default
      tools:
        enabled: true
        allowed_tools: [websearch.search, reporting.query_metric_series]
    # Planned task-first flow. Keep direct_agent out of allowed_strategies so
    # chart-looking turns do not bypass request assessment through visualization routing.
    task_execution_chat:
      enabled: true
      display_name: Task Execution Chat
      description: Assess the user request first, answer directly when possible, ask for missing input when required, and execute bounded multi-step tasks before returning a final response.
      strategy: bounded_planner
      agent: support_agent
      llm_profile: local_reasoning
      allowed_agents:
        - task_execution_agent
        - support_agent
        - tool_using_agent
        - support_web_agent
        - chart_agent
        - architecture_document_agent
      allowed_strategies:
        - bounded_planner
        - fallback_answer
      policy_profile: default
      memory:
        enabled: true
        include_document_chunks: true
        default_limit: 6
      tools:
        enabled: true
        allowed_tools: [websearch.search, reporting.query_metric_series]
      metadata:
        implementation_status: phase_4_complete
        routing_mode: task_first
        assessment_agent: task_execution_agent
        target_default_agent: task_execution_agent
        keep_visualization_override_disabled: true
    architecture_document_qa:
      enabled: true
      display_name: Architecture Document Q&A
      description: Answer questions using retrieved architecture document context.
      strategy: retrieval_augmented
      agent: architecture_document_agent
      llm_profile: local_reasoning
      allowed_agents:
        - architecture_document_agent
      allowed_strategies:
        - retrieval_augmented
        - fallback_answer
      policy_profile: default
      memory:
        enabled: true
        include_document_chunks: true
        default_limit: 8
        allowed_project_ids:
          - arch_docs
        default_project_id: arch_docs
      tools:
        enabled: false
        allowed_tools: []

api:
  enabled: true
  base_path: ""
  docs_enabled: true
  openapi_enabled: true
  cors:
    enabled: false
    allow_origins: []
    allow_credentials: true
    allow_methods:
      - GET
      - POST
      - OPTIONS
    allow_headers:
      - Authorization
      - Content-Type
      - X-Request-Id
      - X-Trace-Id
  request_limits:
    max_body_bytes: 1048576
    max_message_chars: 20000
    max_metadata_bytes: 65536
    request_timeout_seconds: 120
    stream_timeout_seconds: 300
  sessions:
    accept_client_session_id: true
    create_session_when_missing: true
    session_id_header: X-Session-Id
  tracing:
    accept_client_trace_id: true
    response_trace_header: X-Trace-Id
    record_request_received: true
    record_response_returned: true
    record_validation_errors: true
  debug_routes:
    enabled: true
    require_localhost: true
    restart_enabled: true
    max_trace_events: 500
    max_search_results: 50
  sse:
    heartbeat_seconds: 15
    send_trace_id_event: true
    send_metadata_events: true

# The session layer owns the conversation/runtime lifecycle but not model/tool/memory behavior. A user's short-term conversation/runtime continuity.
session:
  enabled: true
  identifiers:
    prefix: session
    accept_client_session_id: true
    generate_when_missing: true
    max_length: 128
    allowed_pattern: "^[A-Za-z0-9_.:-]{3,128}$"
  defaults:
    default_user_id: local_user
    default_usecase: default_chat
    default_history_limit: 50
    max_history_limit: 200
    timezone_metadata_key: timezone
  lifecycle:
    create_on_first_chat: true
    resume_existing_sessions: true
    reject_unknown_client_session_id: false
    update_last_seen_on_load: true
    save_after_failed_orchestration: true
    save_after_cancelled_stream: true
  concurrency:
    mode: optimistic_version
    conflict_policy: reject
    max_retries: 1
  state:
    save_on_chat_completion: true
    save_on_stream_completion: true
    save_on_stream_cancellation: true
    save_on_stream_failure: true
    save_each_stream_delta: false
  history:
    enabled: true
    include_tool_summaries: true
    include_system_messages: true
    include_metadata: true
    max_message_chars: 4000
    redaction_enabled: true
  management:
    list_enabled: true
    delete_enabled: true
    default_list_limit: 50
    max_list_limit: 200
  tracing:
    record_session_created: true
    record_session_resumed: true
    record_session_reset: true
    record_state_loaded: true
    record_state_saved: true
    record_history_returned: true
    record_stream_lifecycle: true

visualization:
  enabled: true
  default_renderer: echarts
  allowed_renderers:
    - echarts
  artifact_spec_version: "1.0"
  allowed_chart_types:
    - bar
    - grouped_bar
    - stacked_bar
    - horizontal_bar
    - line
    - multi_line
    - area
    - pie
    - donut
    - scatter
    - bubble
    - histogram
    - box_plot
    - heatmap
    - treemap
    - waterfall
    - gantt
    - radar
    - table
  aliases:
    bar graph: bar
    bar chart: bar
    column chart: bar
    grouped bar graph: grouped_bar
    stacked bar graph: stacked_bar
    line graph: line
    trend chart: line
    pie graph: pie
    donut graph: donut
    scatter plot: scatter
    correlation plot: scatter
    gantt chart: gantt
  limits:
    max_rows_inline: 500
    max_rows_artifact_store: 5000
    max_series: 12
    max_categories: 100
    max_artifact_bytes: 262144
  sample_data:
    enabled: false
    require_explicit_opt_in: true
    max_rows: 24
  context_summary:
    enabled: true
    mode: summary_only
    max_tokens_per_chart_summary: 600
    max_chart_summaries_per_session_context: 5
    max_total_visualization_context_tokens: 1800
    include_data_ref: true
    include_aggregate_stats: true
    include_extrema: true
    include_trend_summary: true
    include_sample_rows: false
    max_sample_rows: 0
    eviction_policy: most_recent_relevant
    allow_full_dataset_in_context: false
  artifact_store:
    enabled: true
    provider: sqlite
    ttl_seconds: 3600
    allow_reference_data_mode: true
    public_retrieval_enabled: true
    retrieval_endpoint: /artifacts/{artifact_id}
    exact_followup_retrieval_enabled: true
    sqlite:
      path: visualization_artifacts.db
      create_parent_dirs: true
      initialize_schema: true
      journal_mode: WAL
      synchronous: NORMAL
      busy_timeout_ms: 5000
      foreign_keys: true
  history_replay:
    enabled: true
    prefer_inline: true
    max_artifacts_per_message: 3
    max_inline_artifact_bytes: 65536
    max_total_bytes_per_message: 131072
  safe_metadata_allowlist:
    - source
    - source_agent
    - currency
    - unit

features:
  streaming_enabled: true
  memory_enabled: true
  tools_enabled: true
  trace_enabled: true

tooling:
  enabled: true
  defaults:
    timeout_seconds: 60
    stream_timeout_seconds: 300
    max_retries: 1
    max_argument_bytes: 65536
    max_result_bytes: 262144
    trace_arguments: false
    trace_results: false
    discovery_on_startup: true
    discovery_refresh_seconds: 300
  registry:
    allow_discovered_tools: true
    require_configured_allowlist: true
    tools:
      websearch.search:
        enabled: true
        mcp_tool_name: websearch.search
        description: Search the public web through the configured MCP server.
        allowed_for:
          usecases:
            - default_chat
            - support_web_chat
          agents:
            - tool_using_agent
            - support_web_agent
          strategies:
            - tool_assisted
        tags:
          - web
          - search
        safety_level: read_only
      reporting.query_metric_series:
        enabled: true
        mcp_tool_name: reporting.query_metric_series
        description: Query bounded visualization-ready reporting datasets through the configured MCP server.
        allowed_for:
          usecases:
            - default_chat
            - support_web_chat
          agents:
            - chart_agent
          strategies:
            - direct_agent
            - tool_assisted
        timeout_seconds: 30
        max_argument_bytes: 8192
        max_result_bytes: 131072
        approval_required: false
        input_schema_override:
          type: object
          properties:
            metric_names:
              type: array
              minItems: 1
              maxItems: 8
              items:
                type: string
                minLength: 1
            dimension:
              type: string
              minLength: 1
            start_date:
              type: string
            end_date:
              type: string
            filters:
              type: object
            aggregation:
              type: string
              enum:
                - sum
                - avg
                - min
                - max
                - count
            granularity:
              type: string
              enum:
                - day
                - week
                - month
                - quarter
                - year
                - category
            sort:
              type: string
              enum:
                - asc
                - desc
            limit:
              type: integer
              minimum: 1
              maximum: 100
          required:
            - metric_names
            - dimension
          additionalProperties: false
        tags:
          - reporting
          - visualization
        safety_level: read_only

# Agents provide task-specific intelligence. Strategies decide the workflow; agents perform task-specific answer/review/extraction behavior.
# Agents may call LLMs through LLMGateway, memory through MemoryGateway, and tools through ToolGateway only when their contract and policy allow it
# A strategy controls workflow shape. An agent controls task-specific intelligence.
# An agent is a role or behavior. A plugin is the implementation that makes the role available.
agents:
  defaults:
    enabled: true
    stream_llm_deltas: true
    expose_agent_metadata: true
    strict_prompt_profile_validation: false
    known_prompt_profiles:
      - general_assistant_v1
      - document_qa_v1
      - task_execution_v1
      - tool_using_v1
      - support_web_v1
      - project_agent_v1
      - memory_curator_v1
      - reviewer_v1
    max_prompt_context_bytes: 32000
    max_output_chars: 12000
    max_tool_intents: 3
    max_memory_candidates: 5
    max_llm_calls: 1
    max_self_managed_tool_calls: 0
    max_self_managed_memory_searches: 0
    allow_self_managed_tools: true
    allow_self_managed_memory: false
    allow_memory_write: true
  plugins:
    chart_agent:
      enabled: true
      type: chart_agent
      display_name: Chart Agent
      description: Generates validated chart artifacts and answers chart follow-up questions through backend gateways.
      llm_profile: local_reasoning
      capabilities:
        answer: true
        review: false
        stream: true
        memory_read: true
        memory_write: false
        memory_candidate_extract: false
        tool_intents: false
        tool_execute: true
        self_managed_memory: false
        self_managed_tools: true
      limits:
        max_self_managed_tool_calls: 1
      allowed_tool_intents:
        - reporting.query_metric_series
      allowed_memory_scopes:
        - project
        - usecase
        - session
    support_agent:
      enabled: true
      type: general_assistant
      display_name: Support Agent
      description: General purpose assistant for direct answers.
      llm_profile: local_reasoning
      prompt_profile: general_assistant_v1
      capabilities:
        answer: true
        review: false
        stream: true
        memory_read: false
        memory_write: false
        memory_candidate_extract: false
        tool_intents: false
        tool_execute: false
        self_managed_memory: false
        self_managed_tools: false
      allowed_tool_intents: []
      allowed_memory_scopes: []
    task_execution_agent:
      enabled: true
      type: task_execution
      display_name: Task Execution Agent
      description: Assesses a request, answers directly when safe, asks for missing input when required, or emits a bounded task list for orchestration.
      llm_profile: local_reasoning
      prompt_profile: task_execution_v1
      capabilities:
        answer: true
        review: false
        stream: false
        memory_read: false
        memory_write: false
        memory_candidate_extract: false
        tool_intents: false
        tool_execute: false
        self_managed_memory: false
        self_managed_tools: false
      allowed_tool_intents: []
      allowed_memory_scopes: []
    tool_using_agent:
      enabled: true
      type: tool_using
      display_name: Tool Using Agent
      description: Produces bounded logical tool intents and final answers from safe tool results.
      llm_profile: local_reasoning
      prompt_profile: tool_using_v1
      capabilities:
        answer: true
        review: false
        stream: true
        memory_read: false
        memory_write: false
        memory_candidate_extract: false
        tool_intents: true
        tool_execute: false
        self_managed_memory: false
        self_managed_tools: false
      allowed_tool_intents:
        - websearch.search
      allowed_memory_scopes: []
    support_web_agent:
      enabled: true
      type: tool_using
      display_name: Support Web Agent
      description: Answers support questions directly and uses web search for current public information when needed.
      llm_profile: local_reasoning
      prompt_profile: support_web_v1
      capabilities:
        answer: true
        review: false
        stream: true
        memory_read: false
        memory_write: false
        memory_candidate_extract: false
        tool_intents: true
        tool_execute: false
        self_managed_memory: false
        self_managed_tools: false
      allowed_tool_intents:
        - websearch.search
      allowed_memory_scopes: []
    architecture_document_agent:
      enabled: true
      type: document_qa
      display_name: Architecture Document Agent
      description: Answers questions using retrieved architecture documents.
      llm_profile: local_reasoning
      prompt_profile: document_qa_v1
      capabilities:
        answer: true
        review: false
        stream: true
        memory_read: true
        memory_write: false
        memory_candidate_extract: false
        tool_intents: false
        tool_execute: false
        self_managed_memory: false
        self_managed_tools: false
      context_policy:
        require_context_for_grounded_claims: true
        cite_context_labels: true
        max_context_items: 6
        max_context_bytes: 12000
        allow_untrusted_context_instructions: false
      allowed_tool_intents: []
      allowed_memory_scopes:
        - project
        - usecase
      memory:
        search_enabled: true
        write_enabled: false
        allowed_project_ids:
          - arch_docs
        default_project_id: arch_docs

llm:
  defaults:
    profile: local_reasoning
    timeout_seconds: 120
    stream_timeout_seconds: 300
    max_retries: 2
    trace_prompts: false
    trace_completions: false
  providers:
    local_provider:
      type: openai_compatible
      enabled: true
      base_url: ${env:LOCAL_LLM_BASE_URL:http://192.168.1.80:8081/v1}
      api_key: ${env:LOCAL_LLM_API_KEY:fake_key}
      timeout_seconds: 120
      stream_timeout_seconds: 300
      headers:
        Content-Type: application/json
  profiles:
    local_reasoning:
      enabled: true
      provider: local_provider
      model: cognitivecomputations_dolphin3.0-mistral-24b #gemma-4-26b-a4b-it # #qwen3.5-27b-claude-4.6-opus-reasoning-distilled-i1
      temperature: 0.7
      max_output_tokens: 8192 #2048
      supports_streaming: true
      supports_json_schema: true
      supports_tool_calling: true
      allowed_for:
        usecases:
          - default_chat
          - support_web_chat
          - architecture_document_qa
          - task_execution_chat
        agents:
          - chart_agent
          - support_agent
          - tool_using_agent
          - support_web_agent
          - architecture_document_agent
          - task_execution_agent
        strategies:
          - direct_agent
          - tool_assisted
          - retrieval_augmented
          - bounded_planner
          - fallback_answer
      fallback_profiles: []

memory:
  enabled: true
  provider: memory_store
  required: false
  defaults:
    default_scope: project
    top_k: 10
    include_agent_memories: true
    include_document_chunks: true
    include_graph_context: true
    max_result_chars: 8000
    max_total_context_chars: 16000
    trace_query_capture: none
    trace_result_content_capture: none
  store:
    database:
      path: ${env:MEMORY_STORE_DB_PATH:memory}
      create_if_missing: true
      schema_version: 1
      embedded_single_process: true
    embeddings:
      provider: fastembed
      model: BAAI/bge-small-en-v1.5
      dimension: 384
      batch_size: 64
      normalize: true
      dimension_mismatch: error
    reranker:
      enabled: true
      provider: fastembed
      model: Xenova/ms-marco-MiniLM-L-6-v2
      top_n: 60
  chunking:
    strategy: markdown_section
    max_tokens: 350
    overlap_tokens: 50
    include_heading_path: true
    include_frontmatter_in_embedding: true
    preserve_code_blocks: true
    removed_chunk_policy: mark_removed
  search:
    limit_max: 30
    vector_top_n: 30
    fts_top_n: 30
    rrf_k: 60
    graph_expansion_enabled: true
    graph_expansion_hops: 1
    final_top_k: 10
    include_component_scores: true
    include_debug: false
  scoring:
    weights:
      reranker: 0.45
      retrieval_fusion: 0.15
      vector: 0.10
      full_text: 0.08
      temporal: 0.07
      importance: 0.06
      confidence: 0.04
      graph: 0.03
      user_rating: 0.02
  lifecycle:
    allow_writes: true
    default_ttl_days: null
    contradiction_policy: keep_both_mark_conflict
    supersede_policy: mark_previous_superseded
    require_durable_scope_for_writes: true
    allow_session_scope_only_writes: false
    require_durable_scope_for_delete_export: true
  privacy:
    default_sensitivity: internal
    allow_llm_context_default: true
    allow_retrieval_default: true
    delete_by_scope_requires_confirm: true
    enable_export_by_scope: false
    enable_delete_by_scope: false
    hard_delete_enabled: false
    tombstone_on_forget: true
    require_policy_approval_for_delete_export: true
  health:
    deep_check_enabled: false

mcp:
  main:
    name: main
    enabled: true
    endpoint: ${env:MCP_MAIN_URL:http://localhost:9001/mcp}
    transport: http
    timeout_seconds: 60
    stream_timeout_seconds: 300
    auth:
      mode: ${env:MCP_AUTH_MODE:none}
      token: ${env:MCP_BEARER_TOKEN:}
      jwt: ${env:MCP_JWT:}
      oauth:
        token_url: ${env:MCP_OAUTH_TOKEN_URL:}
        client_id: ${env:MCP_OAUTH_CLIENT_ID:}
        client_secret: ${env:MCP_OAUTH_CLIENT_SECRET:}
        scopes: []
    tool_discovery_enabled: true

persistence:
  base_dir: ${env:APP_DATA_DIR:./data}
  workflow_state:
    provider: sqlite
    sqlite:
      path: workflow_state.db
      create_parent_dirs: true
      initialize_schema: true
      journal_mode: WAL
      synchronous: NORMAL
      busy_timeout_ms: 5000
      foreign_keys: true
      required: true
      max_state_bytes: 1048576
      max_history_messages: 50
      reset_mode: replace_with_empty_state
      store_user_id: false
      store_user_id_hash: true
  trace:
    provider: sqlite
    sqlite:
      path: trace.db
      create_parent_dirs: true
      initialize_schema: true
      journal_mode: WAL
      synchronous: NORMAL
      busy_timeout_ms: 5000
      foreign_keys: true
      required: true
      max_event_payload_bytes: 32768
      max_error_detail_bytes: 4096
      max_events_per_trace_read: 1000
      max_search_results: 200
      store_raw_session_id: false
      store_session_id_hash: true
      store_raw_user_id: false
      store_user_id_hash: true
      capture_request_body: false
      capture_response_body: false
      capture_llm_prompts: false
      capture_llm_completions: false
      capture_tool_payloads: summaries_only
      capture_memory_queries: summaries_only
      retention:
        enabled: true
        keep_days: 30
        cleanup_batch_size: 1000

# Policy is implemented as a cross-cutting runtime layer. It does not execute actions. It decides whether actions are allowed, denied, or approval-required.
policy:
  enabled: true
  mode: report_only # enforce
  default_decision: allow # deny
  fail_closed: true
  default_profile: default
  visualization:
    enabled: true
    require_data_source: true
    allow_memory_data: true
    allow_tool_data: true
    allow_uploaded_file_data: true
    allow_exact_followup_retrieval: true
    allowed_data_sources:
      - deterministic_synthesis
      - user_provided
      - workflow_state
      - uploaded_file
      - memory
      - tool
  profiles:
    default:
      enabled: true
      deny_unknown_tools: true
      deny_unknown_llm_profiles: true
      require_memory_scope: true
      allow_memory_writes: true
      allow_write_tools: true
      allow_destructive_tools: false
      allow_external_side_effect_tools: false
      allow_approval_required_tools: false
      usecases:
        allowed:
          - default_chat
          - support_web_chat
          - task_execution_chat
          - architecture_document_qa
      strategies:
        allowed:
          - direct_agent
          - tool_assisted
          - bounded_planner
          - retrieval_augmented
          - fallback_answer
      agents:
        allowed:
          - support_agent
          - task_execution_agent
          - tool_using_agent
          - support_web_agent
          - architecture_document_agent
          - chart_agent
      llm:
        allowed_profiles:
          - local_reasoning
        allow_prompt_trace: true
        allow_completion_trace: true
      memory:
        allowed_read_scopes:
          - project
          - user  # when project_id is absent, usecase runs memory search in user scope
          - usecase
        allowed_write_scopes: []
      tools:
        allowed_tools:
          - websearch.search
          - reporting.query_metric_series
      approval:
        require_approval_for_write_tools: true
        require_approval_for_destructive_tools: true
        require_approval_for_external_side_effect_tools: true
        require_approval_for_memory_writes: false
      fallback:
        allow_fallbacks: true
        allow_after_denial: false
        allow_after_external_side_effects: false
        allowed_strategies:
          - fallback_answer
      trace:
        allow_trace: true
        expose_raw_payloads: false
        expose_prompt_text: false
        expose_completion_text: false
      stream:
        allow_stream_events: true
        expose_internal_events: false
        expose_raw_deltas: false
      capabilities:
        expose_enabled: true
        include_policy_profiles: false
        include_denied_actions: false
      health:
        expose_enabled: true
        include_profile_names: true
        include_decision_counts: false
      audit:
        enabled: true
        include_reason_codes: true
        include_actor_identifiers: false
        include_resource_names: true
      decision_cache:
        enabled: true
        ttl_seconds: 30
        max_entries: 1024

observability:
  log_level: ${env:LOG_LEVEL:INFO}
  structured_logging: true
  trace_enabled: true
  trace_payloads_enabled: false
  trace_store_required: true
  redact_secrets: true
  include_stack_traces_in_logs: false
  include_stack_traces_in_traces: false
  max_trace_payload_chars: 8000
  slow_request_ms: 5000
  slow_llm_call_ms: 30000
  slow_tool_call_ms: 10000
  metrics_enabled: true

health:
  expose_config_summary: true
  expose_provider_names: true
  expose_secret_values: false
  include_component_details: true