app:
  name: pluggable-agentic-ai-backend
  environment: local
  active_usecase: default_chat
  data_dir: ${env:APP_DATA_DIR:./data}

features:
  streaming_enabled: false
  memory_enabled: false
  tools_enabled: false
  trace_enabled: true

usecases:
  default_chat:
    enabled: true
    description: Default local backend use case.
    strategy: direct_agent
    default_agent: support_agent
    allowed_agents:
      - support_agent
    policy_profile: default

strategies:
  direct_agent:
    enabled: true
    type: direct
    description: Run the configured default agent directly.

agents:
  support_agent:
    enabled: true
    module: app.testing.fakes.fake_agent
    class_name: FakeAgent
    description: Placeholder support agent for local backend startup.

llm:
  default_profile: local_reasoning
  providers:
    local_provider:
      type: openai_compatible
      base_url: ${env:LOCAL_LLM_BASE_URL:http://localhost:8081/v1}
      api_key: ${env:LOCAL_LLM_API_KEY:}
  profiles:
    local_reasoning:
      provider: local_provider
      model: local-reasoning-model

mcp:
  main:
    url: ${env:MCP_MAIN_URL:http://localhost:9001/mcp}

persistence:
  base_dir: ${env:APP_DATA_DIR:./data}
  workflow_state:
    provider: sqlite
    sqlite:
      path: workflow_state.db
      create_parent_dirs: true
      initialize_schema: true
      journal_mode: WAL
      synchronous: NORMAL
      busy_timeout_ms: 5000
      foreign_keys: true
      required: true
      max_state_bytes: 1048576
      max_history_messages: 50
      reset_mode: replace_with_empty_state
      store_user_id: false
      store_user_id_hash: true
  trace:
    provider: sqlite
    sqlite:
      path: trace.db
      create_parent_dirs: true
      initialize_schema: true
      journal_mode: WAL
      synchronous: NORMAL
      busy_timeout_ms: 5000
      foreign_keys: true
      required: true
      max_event_payload_bytes: 32768
      max_error_detail_bytes: 4096
      max_events_per_trace_read: 1000
      max_search_results: 200
      store_raw_session_id: false
      store_session_id_hash: true
      store_raw_user_id: false
      store_user_id_hash: true
      capture_request_body: false
      capture_response_body: false
      capture_llm_prompts: false
      capture_llm_completions: false
      capture_tool_payloads: summaries_only
      capture_memory_queries: summaries_only
      retention:
        enabled: false
        keep_days: 30
        cleanup_batch_size: 1000
  memory:
    provider: memory_store
    required: false
    memory_store:
      database_path: ${env:MEMORY_STORE_DB_PATH:memory}
      default_scope: project
      search_limit_default: 10
      search_limit_max: 30
      allow_writes: false

policy:
  default_profile: default
  profiles:
    default:
      deny_unknown_tools: true
      deny_unknown_llm_profiles: true
      require_memory_scope: true
      allow_memory_writes: false

observability:
  log_level: ${env:APP_LOG_LEVEL:INFO}
  structured_logging: true
  trace_enabled: true
  trace_payloads_enabled: false
  trace_store_required: true
  redact_secrets: true
  include_stack_traces_in_logs: false
  include_stack_traces_in_traces: false
  max_trace_payload_chars: 8000
  slow_request_ms: 5000
  slow_llm_call_ms: 30000
  slow_tool_call_ms: 10000
  metrics_enabled: true

health:
  expose_config_summary: true
  expose_provider_names: true
  expose_secret_values: false
  include_component_details: true